# Spring Boot configuration
spring:
  profiles:
    active: dev
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${DATAHUB_KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${DATAHUB_KEYCLOAK_JWK_SET_URI}

server:
  port: 8082
  servlet.context-path: /api/user/v1

management:
  endpoint:
    health:
      enabled: true
      show-details: never
    shutdown:
      enabled: true
  endpoints:
    enabled-by-default: false
    web:
      base-path: /actuator
      exposure:
        include: health,shutdown

hub:
  supportEmail: ${supportEmail}
  emailQueue: ${EmailQueue}

logging:
  level:
    root: warn
    userservice:
      UserServiceApplication: info
    org.springframework.web.servlet:
      DispatcherServlet: trace
      mvc.method.annotation:
        HttpEntityMethodProcessor: trace

keycloak:
  realm: ${DATAHUB_KEYCLOAK_REALM}
  resource: ${DATAHUB_KEYCLOAK_CLIENT_ID}

# RAS configuration - DEPRECATED (kept for reference during migration)
# ras:
#   url: ${rasurl}
#   client:
#     id: ${rasclientid}
#     secret: ${rasclientsecret}
#   auth: ${rasauth}
#
# redirect:
#   url: ${redirecturl}

---
# DEV

spring:
  config:
    #import: aws-secretsmanager:application_dev
    activate:
      on-profile: dev
  cloud.aws.region.static: us-west-2
  jpa:
    show-sql: true
  security:
    user:
      name: ${DATAHUB_SPRING_MANAGEMENT_USER}
      password: ${DATAHUB_SPRING_MANAGEMENT_PASSWORD}

management:
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "[%boldMagenta(USER)] [%boldGreen(DEV)] %d{yyyy-MM-dd HH:mm:ss.SSS} %highlight([%5p]) --- [%cyan(%15.15t)] %-40.40logger{1.} %boldYellow(::) %m%n%wEx"
---
# TEST

spring:
  config:
    import: aws-secretsmanager:application_test
    activate:
      on-profile: test

  cloud.aws.region.static: us-west-2

logging:
  pattern:
    console: "[USER] [TEST] %d{yyyy-MM-dd HH:mm:ss.SSS} [%5p] --- [%15.15t] %-40.40logger{1.} :: %m%n%wEx"

---
# PROD

spring:
  config:
    import: aws-secretsmanager:application_prod
    activate:
      on-profile: prod
  cloud.aws.region.static: us-west-2

logging:
  pattern:
    console: "[USER] [PROD] %d{yyyy-MM-dd HH:mm:ss.SSS} [%5p] --- [%15.15t] %-40.40logger{1.} :: %m%n%wEx"

